<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>AI Trivia — Join</title>
<style>
  /* Brand palette — blue theme on white (edit --acc / --acc2 to rebrand) */
  :root{--bg:#EAF1FB;--bg2:#DCE8F8;--card:#FFFFFF;--acc:#005BC8;--acc2:#0A84FF;--navy:#0A1B3D;--ok:#1E874B;--bad:#CC2E28;--txt:#0A1B3D;--mut:#5C6B8A;--border:#D5E0F0}
  *{box-sizing:border-box}
  body{margin:0;font-family:'Segoe UI',system-ui,Roboto,Arial,sans-serif;background:linear-gradient(180deg,var(--bg2),var(--bg));color:var(--txt);min-height:100vh;border-top:6px solid var(--acc)}
  .wrap{max-width:560px;margin:0 auto;padding:20px}
  .brand{display:flex;align-items:center;gap:12px;margin-top:8px}
  .brand span{font-weight:900;font-size:20px;letter-spacing:1px;color:#fff;background:var(--acc);padding:5px 14px;border-radius:7px}
  h1{font-size:26px;margin:12px 0 2px;letter-spacing:.3px;color:var(--navy)}
  .sub{color:var(--mut);font-size:14px;margin-bottom:18px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:16px;box-shadow:0 8px 24px rgba(10,27,61,.10)}
  label{display:block;font-size:13px;color:var(--mut);margin:10px 0 6px}
  input{width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--border);background:#F5F8FD;color:var(--navy);font-size:18px;letter-spacing:2px}
  input:focus{outline:none;border-color:var(--acc)}
  input.name{letter-spacing:normal}
  button{width:100%;padding:15px;border:0;border-radius:12px;font-size:17px;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(90deg,var(--acc),var(--acc2));margin-top:14px}
  button:disabled{opacity:.5;cursor:not-allowed}
  .opt{display:block;width:100%;text-align:left;padding:18px;border-radius:14px;border:1.5px solid var(--border);background:#F5F8FD;color:var(--navy);font-size:17px;margin-top:12px;font-weight:600;transition:transform .05s}
  .opt:active{transform:scale(.99)}
  .opt.A{border-left:6px solid #005BC8}.opt.B{border-left:6px solid #0A84FF}.opt.C{border-left:6px solid #F5820A}.opt.D{border-left:6px solid #1E874B}
  .opt.correct{background:rgba(30,135,75,.16);border-color:var(--ok)}
  .opt.wrong{background:rgba(204,46,40,.12);border-color:var(--bad)}
  .opt.chosen{outline:3px solid var(--acc)}
  .timer{height:10px;background:#DCE6F5;border-radius:8px;overflow:hidden;margin:14px 0}
  .timer > i{display:block;height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));width:100%;transition:width .2s linear}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .pill{background:#EAF1FB;border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--mut)}
  .players{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .chip{background:#E5EFFB;border:1px solid var(--border);border-radius:999px;padding:6px 12px;font-size:13px;color:var(--navy)}
  .big{font-size:20px;font-weight:700;line-height:1.35;color:var(--navy)}
  .center{text-align:center}
  .score{font-size:48px;font-weight:800;background:linear-gradient(90deg,var(--acc),var(--acc2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .muted{color:var(--mut);font-size:14px}
  .err{color:var(--bad);font-size:14px;margin-top:8px;min-height:18px}
  table{width:100%;border-collapse:collapse;margin-top:8px}
  td{padding:8px 6px;border-bottom:1px solid var(--border);font-size:14px;color:var(--navy)}
  .hide{display:none}
  .status{font-size:13px;color:var(--mut);text-align:center;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><span>🧠 AI TRIVIA</span></div>
  <h1>AI Trivia</h1>
  <div class="sub">Join the live game — answer within 15 seconds!</div>

  <!-- JOIN -->
  <div class="card" id="joinCard">
    <label>Game PIN</label>
    <input id="pin" inputmode="numeric" maxlength="6" placeholder="123456"/>
    <label>Your name</label>
    <input id="name" class="name" maxlength="24" placeholder="e.g. Siva"/>
    <button id="joinBtn">Join game</button>
    <div class="err" id="joinErr"></div>
  </div>

  <!-- LOBBY -->
  <div class="card hide" id="lobbyCard">
    <div class="row"><div class="big" id="lobbyTitle"></div><span class="pill" id="lobbyState">Waiting…</span></div>
    <div class="muted" id="lobbyMeta"></div>
    <div class="status">Get ready — the presenter will start soon.</div>
    <div class="players" id="players"></div>
  </div>

  <!-- QUESTION -->
  <div class="card hide" id="qCard">
    <div class="row">
      <span class="pill" id="qProgress"></span>
      <span class="pill" id="qCat"></span>
    </div>
    <div class="timer"><i id="bar"></i></div>
    <div class="big" id="qText"></div>
    <div id="opts"></div>
    <div class="status" id="qStatus"></div>
  </div>

  <!-- REVEAL -->
  <div class="card hide center" id="revealCard">
    <div id="verdict" class="big"></div>
    <div class="score" id="gained"></div>
    <div class="muted" id="explain"></div>
    <div class="pill" style="margin-top:12px;display:inline-block" id="myRank"></div>
    <div class="status" style="margin-top:16px;text-align:left;text-transform:uppercase;letter-spacing:1px;color:var(--acc);font-weight:700">Leaderboard</div>
    <table id="playerBoard"></table>
  </div>

  <!-- FINISHED -->
  <div class="card hide center" id="doneCard">
    <div class="big">🏁 Final results</div>
    <div class="score" id="finalScore"></div>
    <div class="pill" id="finalRank"></div>
    <table id="finalBoard"></table>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
let me=null, curDeadline=0, curTotalMs=15000, answered=false, barTimer=null;
const $=id=>document.getElementById(id);
const show=(...ids)=>{['joinCard','lobbyCard','qCard','revealCard','doneCard'].forEach(x=>$(x).classList.add('hide'));ids.forEach(x=>$(x).classList.remove('hide'));};

$('joinBtn').onclick=()=>{
  const pin=$('pin').value.trim(), name=$('name').value.trim();
  if(!/^\d{6}$/.test(pin)){$('joinErr').textContent='Enter the 6-digit PIN.';return;}
  if(!name){$('joinErr').textContent='Enter your name.';return;}
  $('joinBtn').disabled=true; $('joinErr').textContent='';
  socket.emit('player:join',{pin,name},res=>{
    $('joinBtn').disabled=false;
    if(!res||!res.ok){$('joinErr').textContent=({no_game:'Game not found.',finished:'That game already ended.'})[res&&res.reason]||'Could not join.';return;}
    me={...res.you,score:0};
    $('lobbyTitle').textContent=res.title;
    $('lobbyMeta').textContent='Session '+res.sessionNumber;
    show('lobbyCard');
  });
};

socket.on('players',list=>{
  $('players').innerHTML=list.map(p=>`<span class="chip">${esc(p.name)}</span>`).join('');
});

socket.on('state',s=>{ if(s.state==='question')$('lobbyState').textContent='Live'; });

socket.on('question',q=>{
  answered=false; curDeadline=q.deadline; curTotalMs=q.timeMs;
  $('qProgress').textContent=`Q${q.index+1} / ${q.total}`;
  $('qCat').textContent=`${q.category} · ${q.difficulty}`;
  $('qText').textContent=q.question;
  $('qStatus').textContent='';
  const letters=['A','B','C','D'];
  $('opts').innerHTML=q.options.map((o,i)=>`<button class="opt ${letters[i]}" data-i="${i}"><b>${letters[i]}.</b> ${esc(o)}</button>`).join('');
  [...document.querySelectorAll('.opt')].forEach(b=>b.onclick=()=>choose(+b.dataset.i,b));
  show('qCard'); runBar();
});

function choose(i,btn){
  if(answered)return; answered=true;
  [...document.querySelectorAll('.opt')].forEach(b=>b.disabled=true);
  btn.classList.add('chosen');
  socket.emit('player:answer',{choice:i},r=>{
    $('qStatus').textContent=r&&r.ok?'✔ Answer locked in — waiting for others…':'Answer not counted ('+((r&&r.reason)||'error')+')';
  });
}

function runBar(){
  clearInterval(barTimer);
  barTimer=setInterval(()=>{
    const left=Math.max(0,curDeadline-Date.now());
    $('bar').style.width=(100*left/curTotalMs)+'%';
    if(left<=0){clearInterval(barTimer); if(!answered){$('qStatus').textContent="⏱ Time's up!";[...document.querySelectorAll('.opt')].forEach(b=>b.disabled=true);}}
  },100);
}

socket.on('reveal',r=>{
  clearInterval(barTimer);
  const mine=(me.answers||[]);
  // find my last answer via chosen button state
  const chosen=document.querySelector('.opt.chosen');
  const myChoice=chosen?+chosen.dataset.i:-1;
  const correct=myChoice===r.correctIndex;
  const rankRow=r.leaderboard.find(x=>x.id===me.id);
  if(rankRow)me.score=rankRow.score;
  $('verdict').textContent=myChoice<0?'⏱ No answer':(correct?'✅ Correct!':'❌ Not quite');
  const prev=me._score||0; const gained=(rankRow?rankRow.score:0)-prev; me._score=rankRow?rankRow.score:prev;
  $('gained').textContent=correct?('+'+gained):'+0';
  $('explain').textContent=r.explanation||'';
  $('myRank').textContent=rankRow?`You're #${rankRow.rank} · ${rankRow.score} pts`:'';
  renderPlayerBoard($('playerBoard'),r.leaderboard,10);
  show('revealCard');
});

function renderPlayerBoard(el,list,limit){
  el.innerHTML=(list||[]).slice(0,limit).map(p=>{
    const medal=p.rank===1?'🥇':p.rank===2?'🥈':p.rank===3?'🥉':('#'+p.rank);
    const meRow=p.id===me.id?'style="background:#E5EFFB;font-weight:800"':'';
    return `<tr ${meRow}><td>${medal}</td><td style="text-align:left">${esc(p.name)}${p.id===me.id?' (you)':''}</td><td style="text-align:right">${p.score}</td></tr>`;
  }).join('');
}

socket.on('finished',f=>{
  const mine=f.leaderboard.find(x=>x.id===me.id);
  $('finalScore').textContent=mine?mine.score+' pts':'—';
  $('finalRank').textContent=mine?`Rank #${mine.rank} of ${f.leaderboard.length}`:'';
  renderPlayerBoard($('finalBoard'),f.leaderboard,10);
  show('doneCard');
});

socket.on('host_left',()=>{$('qStatus').textContent='The presenter left the session.';});
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
</script>
</body>
</html>
